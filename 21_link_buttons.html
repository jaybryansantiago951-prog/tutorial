<!doctype html>
<html>
  <head>
    <style>
      a:link,
      a:visited {
        background-color: #ea86db;
        color: white;
        padding: 15px 25px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
      }

      a:hover,
      a:active {
        background-color: rgb(209, 9, 135);
      }
    </style>
  </head>
  <body>
    <h2>Link Button</h2>
    <p>A link styled to JW.org/tl:</p>
    <a href="https://jw.org/tl" target="_blank">Link to Jw.org</a>
  </body>
</html>
